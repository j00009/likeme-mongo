<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LikeMe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#" onclick="cargarPosts()">
                <i class="bi bi-camera-fill"></i>
                LikeMe
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto align-items-center gap-2">

                    <li class="nav-item">

                        <button class="btn btn-outline-light" onclick="misPosts()">

                            Mis Posts
                        </button>

                    </li>

                    <li class="nav-item">

                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPost">

                            Crear Post
                        </button>

                    </li>

                    <li class="nav-item">

                        <div id="usuarioActual"></div>

                    </li>

                </ul>

            </div>

        </div>

    </nav>


    <!-- POSTS -->

    <div class="container py-5">

        <div class="row posts g-4">

        </div>

    </div>


    <!-- MODAL -->

    <div class="modal fade" id="modalPost">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Crear publicación
                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <form id="formPost">

                        <div class="mb-3">

                            <label for="usuario" class="form-label">
                                Usuario
                            </label>

                            <input id="usuario" type="text" class="form-control" required>

                        </div>

                        <div class="mb-3">

                            <label for="url" class="form-label">
                                URL Imagen
                            </label>

                            <input id="url" type="text" class="form-control" required>

                        </div>

                        <div class="mb-3">

                            <label for="descripcion" class="form-label">
                                Descripción
                            </label>

                            <textarea id="descripcion" class="form-control" rows="3">
                            </textarea>

                        </div>

                        <button class="btn btn-primary w-100">

                            Publicar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>
    <div class="modal fade" id="loginModal">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">
                    <h5>Iniciar sesión</h5>
                </div>

                <div class="modal-body">

                    <form id="formLogin">

                        <div class="mb-3">
                            <input id="loginEmail" type="email" class="form-control" placeholder="Email" required>
                        </div>

                        <div class="mb-3">
                            <input id="loginPassword" type="password" class="form-control" placeholder="Contraseña"
                                required>
                        </div>

                        <button class="btn btn-dark w-100">
                            Entrar
                        </button>

                    </form>

                    <button class="btn btn-link w-100 mt-3" data-bs-target="#registroModal" data-bs-toggle="modal">

                        Crear cuenta
                    </button>

                </div>

            </div>

        </div>

    </div>


    <!-- MODAL REGISTRO -->

    <div class="modal fade" id="registroModal">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">
                    <h5>Crear cuenta</h5>
                </div>

                <div class="modal-body">

                    <form id="formRegistro">

                        <div class="mb-3">
                            <input id="registroNombre" type="text" class="form-control" placeholder="Nombre" required>
                        </div>

                        <div class="mb-3">
                            <input id="registroEmail" type="email" class="form-control" placeholder="Email" required>
                        </div>

                        <div class="mb-3">
                            <input id="registroPassword" type="password" class="form-control" placeholder="Contraseña"
                                required>
                        </div>

                        <button class="btn btn-primary w-100">
                            Registrarse
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <div class="modal fade" id="comentariosModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>Comentarios</h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div
                class="modal-body"
                id="comentariosContainer">

            </div>

        </div>

    </div>

</div>
<div class="modal fade" id="editarModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>Editar Post</h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <form id="formEditar">

                    <input
                        type="hidden"
                        id="editPostId">

                    <div class="mb-3">

                        <label>URL Imagen</label>

                        <input
                            type="text"
                            id="editUrl"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Descripción</label>

                        <textarea
                            id="editDescripcion"
                            class="form-control">
                        </textarea>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Guardar cambios
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script src="/js/script.js"></script>

</body>

</html>
